<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient de fond -->
  <defs>
    <linearGradient id="bannerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F3C88;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9333EA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fond -->
  <rect width="1200" height="200" fill="url(#bannerGrad)" />
  
  <!-- Formes décoratives -->
  <circle cx="100" cy="50" r="40" fill="#FFD700" opacity="0.15" />
  <circle cx="1100" cy="150" r="60" fill="#FF6B9D" opacity="0.15" />
  <polygon points="600,20 650,80 550,80" fill="#FFA500" opacity="0.1" />
  
  <!-- Texte principal -->
  <text x="600" y="80" font-size="56" font-weight="bold" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif">
    DanProject
  </text>
  
  <!-- Sous-titre -->
  <text x="600" y="130" font-size="24" text-anchor="middle" fill="#E0E7FF" font-family="Arial, sans-serif">
    Gestion des Absences Scolaires
  </text>
  
  <!-- Ligne de séparation -->
  <line x1="400" y1="150" x2="800" y2="150" stroke="#FFD700" stroke-width="2" opacity="0.7" />
</svg>
